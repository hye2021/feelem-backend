version: "3.8"

services:
  # 1️⃣ 추천 서버 (FastAPI)
  recommend-server:
    image: 605793897494.dkr.ecr.ap-northeast-2.amazonaws.com/recommend-server:latest
    container_name: recommend-server
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - chromadb
      - redis
    networks:
      - backend-net

  # 2️⃣ ChromaDB
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/.chroma/index
    networks:
      - backend-net

  # 3️⃣ Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend-net

volumes:
  chroma-data:
  redis-data:

networks:
  backend-net:
    driver: bridge
