name: Deploy Spring Boot Backend to EC2

on:
  push:
    branches:
      - main # main 브랜치에 푸시될 때마다 실행

env:
  PROJECT_PATH: ./feelem
  JAR_NAME: feelem-0.0.1-SNAPSHOT.jar
  EC2_HOST: 13.124.105.243
  EC2_USER: ubuntu
  TARGET_DIR: /home/ubuntu/ppt-backend/feelem # EC2 내 백엔드 프로젝트 루트 디렉토리
  DOCKER_COMPOSE_DIR: /home/ubuntu/ppt-backend # docker-compose.yml이 있는 디렉토리

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ${{ env.PROJECT_PATH }}/gradlew

      - name: Build with Gradle
        run: |
          cd ${{ env.PROJECT_PATH }}
          ./gradlew bootJar
        # 빌드된 JAR 파일은 ${{ env.PROJECT_PATH }}/build/libs/ 에 생성됩니다.

      - name: Get JAR file path
        id: get_jar_path
        run: |
          JAR_FILE_PATH=$(find ${{ env.PROJECT_PATH }}/build/libs -name "*.jar" -print -quit)
          echo "JAR_FILE_PATH=${JAR_FILE_PATH}" >> $GITHUB_ENV
          echo "Built JAR file: $JAR_FILE_PATH"

      # 1. JAR 파일 전송 (SCP)
      - name: Transfer JAR to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7 # 파일 전송 전용 액션
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ${{ env.JAR_FILE_PATH }}
          target: ${{ env.TARGET_DIR }}
          strip_components: 3 # build/libs/feelem-0.0.1-SNAPSHOT.jar -> feelem-0.0.1-SNAPSHOT.jar
          # 이 액션에서는 command/script/exec 사용 안 함

      # 2. EC2에서 Docker 명령 실행 (SSH)
      - name: Run Docker Compose on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0 # SSH 명령 실행 전용 액션
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: | # ssh-action에서는 'script' 인풋이 올바릅니다.
            cd ${{ env.DOCKER_COMPOSE_DIR }}
            docker-compose down # 기존 컨테이너 중지 및 제거
            docker-compose up -d # 새로운 JAR 파일로 컨테이너 실행 (빌드 없이)
            docker-compose ps # 확인
            echo "Deployment complete on EC2."