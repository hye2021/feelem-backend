name: Deploy Spring Boot Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'feelem/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_NAME: feelem-app
  SPRING_BOOT_PROJECT_PATH: ./feelem
  DOCKER_IMAGE_NAME: feelem-springboot-app
  DOCKER_IMAGE_TAG: latest

  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ubuntu
  EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

  REMOTE_APP_DIR: /home/ubuntu/ppt-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. JAR 빌드
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          cd ${{ env.SPRING_BOOT_PROJECT_PATH }}
          chmod +x ./gradlew
          ./gradlew bootJar

      # 2. Docker 이미지 빌드
      - name: Build Docker Image
        run: docker build -t ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }} ${{ env.SPRING_BOOT_PROJECT_PATH }}

      # 3. Docker 이미지 저장 (.tar)
      - name: Save Docker Image to Tar
        run: docker save -o ${{ github.workspace }}/${{ env.DOCKER_IMAGE_NAME }}.tar ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}

      # 4. SSH Agent 설정
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ env.EC2_SSH_KEY }}

      # 5. SSH 접속 테스트 (디버깅용)
      - name: Test SSH Connection
        run: ssh -vvv -o StrictHostKeyChecking=no -T ${{ env.EC2_USER }}@${{ env.EC2_HOST }} || true

      # 6. rsync로 EC2에 파일 전송
      - name: Transfer files to EC2
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          rsync -avz ${{ github.workspace }}/${{ env.DOCKER_IMAGE_NAME }}.tar \
                      ${{ github.workspace }}/docker-compose.yml \
                      ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:${{ env.REMOTE_APP_DIR }}/

      # 7. EC2에서 Docker Load + Compose 실행
      - name: Run Docker Compose on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_SSH_KEY }}
          script: |
            cd ${{ env.REMOTE_APP_DIR }}
            echo "Loading Docker image..."
            docker load -i ${{ env.DOCKER_IMAGE_NAME }}.tar

            echo "Stopping existing containers..."
            docker-compose down

            echo "Starting new containers..."
            docker-compose up -d

            echo "Deployment complete. Check status with 'docker-compose ps'"
