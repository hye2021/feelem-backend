name: Deploy Spring Boot Backend to EC2

on:
  push:
    branches:
      - main # main 브랜치에 푸시될 때마다 실행

env:
  PROJECT_PATH: ./feelem
  JAR_NAME: feelem-0.0.1-SNAPSHOT.jar # build.gradle에 따라 달라질 수 있음
  EC2_HOST: 13.124.105.243
  EC2_USER: ubuntu
  TARGET_DIR: /home/ubuntu/ppt-backend/feelem # EC2 내 백엔드 프로젝트 루트 디렉토리
  DOCKER_COMPOSE_DIR: /home/ubuntu/ppt-backend # docker-compose.yml이 있는 디렉토리

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # GitHub Actions 환경

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x ${{ env.PROJECT_PATH }}/gradlew

      - name: Build with Gradle
        run: |
          cd ${{ env.PROJECT_PATH }}
          ./gradlew bootJar # JAR 파일 빌드
        # 빌드된 JAR 파일은 ${{ env.PROJECT_PATH }}/build/libs/ 에 생성됩니다.

      - name: Get JAR file path
        id: get_jar_path
        run: |
          JAR_FILE_PATH=$(find ${{ env.PROJECT_PATH }}/build/libs -name "*.jar" -print -quit)
          echo "JAR_FILE_PATH=${JAR_FILE_PATH}" >> $GITHUB_ENV
          echo "Built JAR file: $JAR_FILE_PATH"

      - name: Configure AWS credentials (Optional, if using S3 for artifact storage)
        # S3를 거치지 않고 바로 SSH로 전송하는 경우 이 단계는 필요 없음
        # (현재 SSH SCP 방식을 가정)
        run: echo "Not using AWS credentials for direct SCP"

      - name: Deploy to EC2 via SCP and SSH
        uses: appleboy/scp-action@v0.1.7 # 파일 전송 (SCP) 및 SSH 명령 실행
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }} # GitHub Secrets에 EC2 개인 키 등록
          source: ${{ env.JAR_FILE_PATH }} # 빌드된 JAR 파일 경로
          target: ${{ env.TARGET_DIR }} # EC2의 목표 디렉토리 (기존 JAR 덮어쓰기)
          # JAR 파일 전송 후 EC2에서 실행할 명령
          strip_components: 3 # build/libs/feelem-0.0.1-SNAPSHOT.jar -> feelem-0.0.1-SNAPSHOT.jar
          # docker-compose.yml이 있는 디렉토리에서 실행해야 함
          script: |
            cd ${{ env.DOCKER_COMPOSE_DIR }}
            docker-compose down # 기존 컨테이너 중지 및 제거
            docker-compose up -d # 새로운 JAR 파일로 컨테이너 실행 (빌드 없이)
            docker-compose ps # 확인
            echo "Deployment complete on EC2."
