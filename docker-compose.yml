  #   build:
  #     context: ./feel_em_ai_reco_server # 이 경로는 AI 서버 실제 경로로 변경
  #     dockerfile: Dockerfile
  #   container_name: feelem-ai-reco
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     CHROMA_PATH: /app/chromadb_data 
  #   volumes:
  #     - chroma_data:/app/chromadb_data 
  #   restart: always

# Docker 볼륨 정의
volumes:
  spring_boot_logs:
  chroma_data: